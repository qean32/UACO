<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Пример таблицы</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #f2f2f2;
      font-weight: bold;
    }

    th:hover {
      width: 50px;
    }
  </style>
</head>

<body>

  <table>
    <thead>
      <tr>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Возраст</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Иван</td>
        <td>Иванов</td>
        <td>30</td>
      </tr>
      <tr>
        <td>Марина</td>
        <td>Петрова</td>
        <td>25</td>
      </tr>
    </tbody>
  </table>

</body>

</html>
